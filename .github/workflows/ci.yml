name: CI

on:
  push:
    branches:
      - main
      - develop
      - MathCraft
      - office-plugin
  pull_request:
    branches:
      - main
      - develop
      - MathCraft
      - office-plugin
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-check:
    name: Compile Check
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Byte-compile source tree
        run: python -m compileall -q src mathcraft_ocr

      - name: Byte-compile key entry files
        run: python -m py_compile src/main.py src/bootstrap/deps_bootstrap.py LaTeXSnipper.spec

      - name: Validate Python comment language
        shell: pwsh
        run: |
          @'
          import ast
          import io
          import pathlib
          import tokenize

          roots = [pathlib.Path("src"), pathlib.Path("mathcraft_ocr"), pathlib.Path("scripts")]
          violations = []
          for root in roots:
              if not root.exists():
                  continue
              for path in sorted(root.rglob("*.py")):
                  if "deps" in path.parts:
                      continue
                  text = path.read_text(encoding="utf-8", errors="replace")
                  for token in tokenize.generate_tokens(io.StringIO(text).readline):
                      if token.type == tokenize.COMMENT and any(ord(ch) > 127 for ch in token.string):
                          violations.append(f"{path}:{token.start[0]} non-ASCII comment")
                  try:
                      tree = ast.parse(text)
                  except SyntaxError:
                      continue
                  for node in ast.walk(tree):
                      if not isinstance(node, (ast.Module, ast.ClassDef, ast.FunctionDef, ast.AsyncFunctionDef)):
                          continue
                      if not node.body:
                          continue
                      first = node.body[0]
                      if (
                          isinstance(first, ast.Expr)
                          and isinstance(first.value, ast.Constant)
                          and isinstance(first.value.value, str)
                          and any(ord(ch) > 127 for ch in first.value.value)
                      ):
                          violations.append(f"{path}:{first.lineno} non-ASCII docstring")
          if violations:
              raise SystemExit("\n".join(violations))
          '@ | python -

      - name: Validate cross-platform packaging metadata
        shell: pwsh
        run: |
          $required = @(
            "Inno\ChineseSimplified.isl",
            "LaTeXSnipper-linux.spec",
            "LaTeXSnipper-macos.spec",
            "scripts\build_deb.sh",
            "scripts\build_macos.sh",
            "scripts\package_common.sh",
            "packaging\debian\DEBIAN\control"
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Required packaging file is missing: $path"
            }
          }
          $iss = "Inno\latexsnipper.iss"
          $text = Get-Content -LiteralPath $iss -Raw
          if ($text -notmatch [regex]::Escape('DefaultDirName={localappdata}\{#MyAppName}')) {
            throw "Inno script must install under localappdata by default: $iss"
          }
          if ($text -notmatch '(?m)^PrivilegesRequired=lowest\r?$') {
            throw "Inno per-user installer must use PrivilegesRequired=lowest: $iss"
          }
          if ($text -match '(?m)^PrivilegesRequired=admin\r?$') {
            throw "Inno per-user installer must not request admin privileges: $iss"
          }
          if ($text -notmatch [regex]::Escape('MessagesFile: "{#MyRepoRoot}\Inno\ChineseSimplified.isl"')) {
            throw "Inno script must use the repository Simplified Chinese language file: $iss"
          }
          foreach ($specPath in @("LaTeXSnipper-linux.spec", "LaTeXSnipper-macos.spec")) {
            $specText = Get-Content -LiteralPath $specPath -Raw
            if ($specText -match "deps/python311|LATEXSNIPPER_BUNDLE_PYTHON_RUNTIME|BUNDLED_PY311|BUNDLED_DEPS_DIR_ENV") {
              throw "Linux/macOS release specs must not bundle build-machine Python runtimes: $specPath"
            }
            $hidden = [regex]::Match($specText, '(?s)hiddenimports=\[(.*?)\],\s*hookspath=').Groups[1].Value
            foreach ($module in @("onnxruntime", "onnxruntime-gpu", "onnx", "cv2", "rapidocr", "numpy", "fitz", "matplotlib", "latex2mathml")) {
              if ($hidden -match '"' + [regex]::Escape($module) + '"') {
                throw "Linux/macOS specs must not hidden-import dependency-runtime module ${module}: $specPath"
              }
            }
            $excludes = [regex]::Match($specText, '(?s)excludes=\[(.*?)\],\s*noarchive=').Groups[1].Value
            foreach ($module in @("onnxruntime", "onnxruntime-gpu", "onnx", "cv2", "rapidocr", "numpy", "fitz", "matplotlib", "latex2mathml", "setuptools", "pkg_resources")) {
              if ($excludes -notmatch '"' + [regex]::Escape($module) + '"') {
                throw "Linux/macOS specs must exclude dependency-runtime module ${module}: $specPath"
              }
            }
          }
          $macosScript = Get-Content -LiteralPath "scripts\build_macos.sh" -Raw
          if ($macosScript -notmatch "DMG_STAGING_DIR") {
            throw "macOS DMG packaging must use a staging directory."
          }
          if ($macosScript -match '\$\(dirname "\$APP_PATH"\)') {
            throw "macOS DMG packaging must not use the app parent directory as the DMG source."
          }
          $release = Get-Content -LiteralPath ".github\workflows\release.yml" -Raw
          foreach ($job in @("build-windows-installer", "build-office-plugin-installer", "build-linux-deb", "build-macos-app", "build-user-manual", "publish-release-assets")) {
            if ($release -notmatch "(?m)^  ${job}:") {
              throw "Release workflow is missing job: $job"
            }
          }
          foreach ($workflow in @((Get-Content -LiteralPath ".github\workflows\ci.yml" -Raw), $release)) {
            if ($workflow -match "actions/checkout@v[0-5]\b") {
              throw "GitHub Actions checkout must use a Node 24 version."
            }
            if ($workflow -match "actions/setup-python@v[0-5]\b") {
              throw "GitHub Actions setup-python must use a Node 24 version."
            }
            if ($workflow -match "actions/setup-dotnet@v[0-4]\b") {
              throw "GitHub Actions setup-dotnet must use a Node 24 version."
            }
            if ($workflow -match "actions/(upload-artifact|download-artifact)@v[0-6]\b") {
              throw "GitHub Actions artifact actions must use Node 24 versions."
            }
            if ($workflow -match "runs-on:\s*windows-latest") {
              throw "Windows workflows must pin windows-2025 instead of windows-latest."
            }
          }
          foreach ($path in @(
            "scripts\build_deb.sh",
            "scripts\build_macos.sh",
            "scripts\package_common.sh",
            "requirements.txt",
            "requirements-build.txt",
            "requirements-linux.txt",
            "requirements-macos.txt",
            "packaging\debian\DEBIAN\postinst",
            "packaging\debian\DEBIAN\postrm",
            "packaging\debian\DEBIAN\prerm"
          )) {
            $content = Get-Content -LiteralPath $path -Raw
            $nonAscii = $content.ToCharArray() | Where-Object { [int]$_ -gt 127 } | Select-Object -First 1
            if ($null -ne $nonAscii) {
              throw "Packaging script/config must stay ASCII-only: $path"
            }
          }

      - name: Byte-compile cross-platform specs
        run: python -m py_compile LaTeXSnipper-linux.spec LaTeXSnipper-macos.spec

      - name: Ensure C++ ATL component
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -property installationPath
          Write-Host "Visual Studio: $vsPath"

          # Check ATL by looking for the header directly (vswhere -requires can be unreliable)
          $msvcDir = Get-ChildItem -Path "$vsPath\VC\Tools\MSVC" -Directory -ErrorAction SilentlyContinue | Sort-Object Name -Descending | Select-Object -First 1
          $atlHeader = if ($msvcDir) { Join-Path $msvcDir.FullName "atlmfc\include\atlbase.h" } else { $null }
          if (-not $atlHeader -or -not (Test-Path $atlHeader)) {
            Write-Host "C++ ATL not found. Installing..."
            $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
            $proc = Start-Process -FilePath $vsInstaller -ArgumentList @(
              'modify',
              '--installPath', "`"$vsPath`"",
              '--add', 'Microsoft.VisualStudio.Component.VC.ATL',
              '--quiet', '--norestart', '--wait'
            ) -Wait -PassThru -NoNewWindow
            Write-Host "VS installer exit code: $($proc.ExitCode)"

            if ($proc.ExitCode -notin @(0, 3010)) {
              Write-Host "vs_installer.exe failed. Trying vs_buildtools.exe fallback..."
              $btPath = "$env:TEMP\vs_buildtools.exe"
              Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vs_buildtools.exe" -OutFile $btPath -UseBasicParsing
              $proc2 = Start-Process -FilePath $btPath -ArgumentList @(
                'modify',
                '--installPath', "`"$vsPath`"",
                '--add', 'Microsoft.VisualStudio.Component.VC.ATL',
                '--quiet', '--norestart', '--wait'
              ) -Wait -PassThru -NoNewWindow
              Write-Host "vs_buildtools.exe exit code: $($proc2.ExitCode)"
              if ($proc2.ExitCode -notin @(0, 3010)) {
                throw "Failed to install C++ ATL component."
              }
            }
          }

          # Verify ATL headers exist
          $msvcDir = Get-ChildItem -Path "$vsPath\VC\Tools\MSVC" -Directory -ErrorAction SilentlyContinue | Sort-Object Name -Descending | Select-Object -First 1
          $atlHeader = if ($msvcDir) { Join-Path $msvcDir.FullName "atlmfc\include\atlbase.h" } else { $null }
          if (-not $atlHeader -or -not (Test-Path $atlHeader)) {
            throw "ATL installation could not be verified: atlbase.h not found under $vsPath\VC\Tools\MSVC"
          }
          Write-Host "ATL verified: $atlHeader"

      - name: Build Office plugin core
        shell: pwsh
        run: |
          dotnet build office_plugin\LaTeXSnipper.OfficePlugin.slnx -c Release
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.ATL -property installationPath
          if (-not $vsPath) { throw "Visual Studio C++ ATL tools were not found." }
          $msbuild = Join-Path $vsPath "MSBuild\Current\Bin\amd64\MSBuild.exe"
          & $msbuild office_plugin\hosts\OleFormulaObjectNative\LaTeXSnipper.OfficePlugin.OleFormulaObjectHandler.vcxproj /p:Configuration=Release /p:Platform=x64 /m
          if ($LASTEXITCODE -ne 0) { throw "Native OLE x64 build failed." }
          & $msbuild office_plugin\hosts\OleFormulaObjectNative\LaTeXSnipper.OfficePlugin.OleFormulaObjectHandler.vcxproj /p:Configuration=Release /p:Platform=Win32 /m
          if ($LASTEXITCODE -ne 0) { throw "Native OLE x86 build failed." }

      - name: Setup Typst
        shell: pwsh
        run: |
          $typstVersion = "0.14.2"
          $typstZip = "typst-x86_64-pc-windows-msvc.zip"
          $typstUrl = "https://github.com/typst/typst/releases/download/v$typstVersion/$typstZip"
          Invoke-WebRequest -Uri $typstUrl -OutFile $env:TEMP\$typstZip
          Expand-Archive -Path $env:TEMP\$typstZip -DestinationPath $env:TEMP\typst -Force
          $typst = Get-ChildItem -Path $env:TEMP\typst -Recurse -Filter "typst.exe" | Select-Object -First 1
          if (-not $typst) { throw "Typst binary not found after extraction." }
          "TYPST=$($typst.FullName)" >> $env:GITHUB_ENV

      - name: Build user manual
        shell: pwsh
        run: |
          & $env:TYPST compile user_manual\user_manual.typ user_manual\LaTeXSnipper_User_Manual.pdf
          if ($LASTEXITCODE -ne 0) { throw "Typst compilation failed." }
          if (-not (Test-Path user_manual\LaTeXSnipper_User_Manual.pdf)) { throw "PDF was not produced." }
