<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LaTeXSnipper Office Plugin Settings</title>
  <link rel="stylesheet" href="./settings.css">
</head>
<body>
  <main class="shell">
    <header class="header">
      <h1 data-i18n="title">LaTeXSnipper Office 插件设置</h1>
    </header>

    <section class="panel accent-panel">
      <div>
        <h2 data-i18n="backendTitle">公式插入方式</h2>
        <p class="hint" data-i18n="backendHint">默认使用 OLE 公式对象，也可切换为 PNG 图片。</p>
      </div>
      <div class="segmented" role="radiogroup" aria-label="Formula insertion backend">
        <button type="button" data-backend="Ole" data-i18n="backendOle">OLE 对象</button>
        <button type="button" data-backend="PowerPointPng" data-i18n="backendPng">PNG 图片</button>
      </div>
    </section>

    <section class="panel accent-panel">
      <div>
        <h2 data-i18n="formulaDefaultsTitle">公式默认属性</h2>
        <p class="hint" data-i18n="formulaDefaultsHint">这些设置应用于新插入公式和格式化命令。</p>
      </div>
      <div class="settings-grid">
        <label>
          <span data-i18n="colorLabel">字体颜色</span>
          <span class="color-control">
            <input id="formulaColor" type="color" value="#000000">
            <button id="resetFormulaColor" type="button" data-i18n="resetColor">恢复黑色</button>
          </span>
        </label>
        <label>
          <span data-i18n="fontStyleLabel">默认字体</span>
          <select id="formulaFontStyle">
            <option value="TeX" data-i18n="fontTeX">TeX 原生字体</option>
            <option value="RomanUpright" data-i18n="fontRomanUpright">罗马正体</option>
            <option value="Bold" data-i18n="fontBold">粗体</option>
            <option value="Italic" data-i18n="fontItalic">斜体</option>
          </select>
        </label>
      </div>
    </section>

    <section class="panel">
      <h2 data-i18n="editorTitle">编辑器键盘行为</h2>
      <div class="key-list">
        <div><kbd>Enter</kbd><span data-i18n="newlineShortcut">新建数学行</span></div>
        <div><kbd>Shift</kbd><span>+</span><kbd>Enter</kbd><span data-i18n="acceptShortcut">插入或更新当前公式</span></div>
        <div><kbd>Ctrl</kbd><span>+</span><kbd>F</kbd><span data-i18n="fractionShortcut">插入分式</span></div>
        <div><kbd>Ctrl</kbd><span>+</span><kbd>R</kbd><span data-i18n="rootShortcut">插入根号</span></div>
        <div><kbd>Ctrl</kbd><span>+</span><kbd>H</kbd><span data-i18n="superscriptShortcut">插入上标</span></div>
        <div><kbd>Ctrl</kbd><span>+</span><kbd>L</kbd><span data-i18n="subscriptShortcut">插入下标</span></div>
        <div><kbd>Ctrl</kbd><span>+</span><kbd>J</kbd><span data-i18n="scriptsShortcut">插入上下标</span></div>
        <div><kbd>Esc</kbd><span data-i18n="cancelShortcut">收回 MathLive 虚拟键盘</span></div>
      </div>
    </section>
  </main>
  <script src="./settings.js"></script>
</body>
</html>
