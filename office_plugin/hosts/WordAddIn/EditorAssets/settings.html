<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LaTeXSnipper Office Plugin Settings</title>
  <link rel="stylesheet" href="./settings.css">
</head>
<body>
  <main class="shell">
    <header class="header">
      <div>
        <h1 data-i18n="title">LaTeXSnipper Office 插件设置</h1>
        <p data-i18n="subtitle">配置公式插入方式和编号默认值。</p>
      </div>
    </header>

    <section class="panel accent-panel">
      <div>
        <h2 data-i18n="backendTitle">公式插入方式</h2>
        <p class="hint" data-i18n="backendHint">默认使用 OLE 公式对象；也可切换为 Word OMML。</p>
      </div>
      <div class="segmented" role="radiogroup" aria-label="Formula insertion backend">
        <button type="button" data-backend="Ole" data-i18n="backendOle">OLE 对象</button>
        <button type="button" data-backend="WordOmml" data-i18n="backendOmml">Word OMML</button>
      </div>
    </section>

    <section id="numberingPanel" class="panel accent-panel">
      <div>
        <h2 data-i18n="numberingTitle">带编号公式默认布局</h2>
        <p class="hint" data-i18n="numberingHint">此设置只影响新插入的编号公式，以及之后被自动编号的普通公式。</p>
      </div>
      <div class="numbering-grid">
        <div class="segmented" role="radiogroup" aria-label="Number placement">
          <button type="button" id="rightNumber" data-placement="Right" data-i18n="numberRight">右编号</button>
          <button type="button" id="leftNumber" data-placement="Left" data-i18n="numberLeft">左编号</button>
        </div>
        <label>
          <span data-i18n="formatLabel">编号格式</span>
          <select id="numberFormat">
            <option value="Arabic" data-i18n="formatArabic">1</option>
            <option value="SectionArabic" data-i18n="formatSectionArabic">1.1</option>
            <option value="LowerRoman" data-i18n="formatLowerRoman">i</option>
            <option value="UpperRoman" data-i18n="formatUpperRoman">I</option>
            <option value="LowerLetter" data-i18n="formatLowerLetter">a</option>
            <option value="UpperLetter" data-i18n="formatUpperLetter">A</option>
          </select>
        </label>
        <label>
          <span data-i18n="enclosureLabel">外框</span>
          <select id="numberEnclosure">
            <option value="Parentheses">( )</option>
            <option value="SquareBrackets">[ ]</option>
            <option value="Braces">{ }</option>
            <option value="None" data-i18n="enclosureNone">无</option>
          </select>
        </label>
      </div>
    </section>

    <section class="panel">
      <h2 data-i18n="editorTitle">编辑器键盘行为</h2>
      <div class="key-list">
        <div><kbd>Enter</kbd><span data-i18n="newlineShortcut">新建数学行</span></div>
        <div><kbd>Shift</kbd><span>+</span><kbd>Enter</kbd><span data-i18n="acceptShortcut">插入或更新当前公式</span></div>
        <div><kbd>Esc</kbd><span data-i18n="cancelShortcut">收回 MathLive 虚拟键盘</span></div>
      </div>
    </section>

  </main>
  <script src="./settings.js"></script>
</body>
</html>
