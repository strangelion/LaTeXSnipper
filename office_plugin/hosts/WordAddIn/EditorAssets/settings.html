<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LaTeXSnipper Office Plugin Settings</title>
  <link rel="stylesheet" href="./settings.css">
</head>
<body>
  <main class="shell">
    <header class="header">
      <div>
        <h1 data-i18n="title">LaTeXSnipper Office 插件设置</h1>
      </div>
    </header>

    <section class="panel accent-panel">
      <div>
        <h2 data-i18n="backendTitle">公式插入方式</h2>
        <p class="hint" data-i18n="backendHint">默认使用 OLE 公式对象；也可切换为 Word OMML。</p>
      </div>
      <div class="segmented" role="radiogroup" aria-label="Formula insertion backend">
        <button type="button" data-backend="Ole" data-i18n="backendOle">OLE 对象</button>
        <button type="button" data-backend="WordOmml" data-i18n="backendOmml">Word OMML</button>
      </div>
    </section>

    <section id="numberingPanel" class="panel accent-panel">
      <div>
        <h2 data-i18n="numberingTitle">带编号公式默认布局</h2>
        <p class="hint" data-i18n="numberingHint">此设置只影响新插入的编号公式，以及之后被自动编号的普通公式。</p>
      </div>
      <div class="numbering-controls">
        <div class="numbering-grid">
          <div class="segmented" role="radiogroup" aria-label="Number placement">
            <button type="button" id="rightNumber" data-placement="Right" data-i18n="numberRight">右编号</button>
            <button type="button" id="leftNumber" data-placement="Left" data-i18n="numberLeft">左编号</button>
          </div>
          <label>
            <span data-i18n="formatLabel">编号格式</span>
            <select id="numberFormat">
              <option value="Arabic" data-i18n="formatArabic">1</option>
              <option value="LowerRoman" data-i18n="formatLowerRoman">i</option>
              <option value="UpperRoman" data-i18n="formatUpperRoman">I</option>
              <option value="LowerLetter" data-i18n="formatLowerLetter">a</option>
              <option value="UpperLetter" data-i18n="formatUpperLetter">A</option>
            </select>
          </label>
          <label>
            <span data-i18n="enclosureLabel">外框</span>
            <select id="numberEnclosure">
              <option value="Parentheses">( )</option>
              <option value="SquareBrackets">[ ]</option>
              <option value="Braces">{ }</option>
              <option value="None" data-i18n="enclosureNone">无</option>
            </select>
          </label>
          <label>
            <span data-i18n="separatorLabel">层级分隔符</span>
            <select id="numberSeparator">
              <option value="-">-</option>
              <option value=".">.</option>
              <option value="·">·</option>
              <option value=":">:</option>
              <option value="/">/</option>
            </select>
          </label>
        </div>
        <div class="numbering-options">
          <label class="check-option"><input id="includeChapter" type="checkbox"><span data-i18n="includeChapter">包含章编号</span></label>
          <label class="check-option"><input id="includeSection" type="checkbox"><span data-i18n="includeSection">包含节编号</span></label>
          <label class="check-option"><input id="hideChapterBoundary" type="checkbox"><span data-i18n="hideChapterBoundary">隐藏章分隔符</span></label>
          <label class="check-option"><input id="hideSectionBoundary" type="checkbox"><span data-i18n="hideSectionBoundary">隐藏节分隔符</span></label>
        </div>
      </div>
    </section>

    <section class="panel accent-panel">
      <div>
        <h2 data-i18n="formulaDefaultsTitle">公式默认属性</h2>
        <p class="hint" data-i18n="formulaDefaultsHint">这些设置仅影响新插入的公式。</p>
      </div>
      <div class="numbering-grid">
        <label>
          <span data-i18n="colorLabel">字体颜色</span>
          <span class="color-control">
            <input id="formulaColor" type="color" value="#000000">
            <button id="resetFormulaColor" type="button">恢复默认</button>
          </span>
        </label>
        <label>
          <span data-i18n="fontStyleLabel">默认字体</span>
          <select id="formulaFontStyle">
            <option value="TeX" data-i18n="fontTeX">TeX 原生字体</option>
            <option value="RomanUpright" data-i18n="fontRomanUpright">罗马正体</option>
            <option value="Bold" data-i18n="fontBold">粗体</option>
            <option value="Italic" data-i18n="fontItalic">斜体</option>
          </select>
        </label>
      </div>
    </section>

    <section class="panel">
      <h2 data-i18n="editorTitle">编辑器键盘行为</h2>
      <div class="key-list">
        <div><kbd>Enter</kbd><span data-i18n="newlineShortcut">新建数学行</span></div>
        <div><kbd>Shift</kbd><span>+</span><kbd>Enter</kbd><span data-i18n="acceptShortcut">插入或更新当前公式</span></div>
        <div><kbd>Ctrl</kbd><span>+</span><kbd>F</kbd><span data-i18n="fractionShortcut">插入分式</span></div>
        <div><kbd>Ctrl</kbd><span>+</span><kbd>R</kbd><span data-i18n="rootShortcut">插入根号</span></div>
        <div><kbd>Ctrl</kbd><span>+</span><kbd>H</kbd><span data-i18n="superscriptShortcut">插入上标</span></div>
        <div><kbd>Ctrl</kbd><span>+</span><kbd>L</kbd><span data-i18n="subscriptShortcut">插入下标</span></div>
        <div><kbd>Ctrl</kbd><span>+</span><kbd>J</kbd><span data-i18n="scriptsShortcut">插入上下标</span></div>
        <div><kbd>Esc</kbd><span data-i18n="cancelShortcut">收回 MathLive 虚拟键盘</span></div>
      </div>
    </section>

  </main>
  <script src="./settings.js"></script>
</body>
</html>
