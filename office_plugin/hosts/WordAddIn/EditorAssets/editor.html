<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LaTeXSnipper</title>
  <link rel="stylesheet" href="./editor.css">
</head>
<body>
  <main class="shell">
    <section class="workspace">
      <div id="mathfieldHost" class="mathfield-host"></div>
      <textarea id="latexSource" spellcheck="false" aria-label="LaTeX source"></textarea>
    </section>
    <aside class="library">
      <div class="library-search"><input type="text" id="globalSearch" class="global-search" placeholder="全局搜索符号或 LaTeX..."></div>
      <div class="library-tabs" id="libraryTabs"></div>
      <div class="library-title"><span id="libraryTitleText"></span><input type="text" id="symbolSearch" class="symbol-search" placeholder="搜索符号或 LaTeX..."></div>
      <div class="symbol-grid" id="symbolGrid"></div>
    </aside>
  </main>
  <footer class="footer">
    <span class="status" id="statusText"></span>
    <button type="button" id="cancelButton"></button>
    <button type="button" id="acceptButton"></button>
  </footer>
  <script src="https://latexsnipper-editor-shared.officeplugin.local/symbol-library.js"></script>
  <script type="module" src="./editor.js"></script>
</body>
</html>
